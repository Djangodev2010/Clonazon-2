<form method="POST" action='{% url "edit_profile" %}'>
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" value="{{user.username}}">
            <label class="form-label">House Number</label>
            <input type="text" name="house_no" class="form-control" value="{{user.house_no}}">
            <label class="form-label">State</label>
            <input type="text" name="state" class="form-control" value="{{user.state}}">
        </div>
        <div class="col-md-6">
            <label class="form-label">Email Address</label>
            <input type="email" name="email" class="form-control" value="{{user.email}}">
            <label class="form-label">City</label>
            <input type="text" name="city" class="form-control" value="{{user.city}}">
            <label class="form-label">Pin Code</label>
            <input type="number" name="pincode" class="form-control" value="{{user.area_pincode}}">
        </div>
        <label class="form-label">Landmark</label>
        <input type="text" name="landmark" class="form-control" value="{{user.landmark}}">
        <div class="col-12 mt-4">
            <h6 class="text-primary fw-bold">Change Password</h6>
            <hr>
        </div>
        <div class="col-md-6">
            <label class="form-label">New Password</label>
            <input type="password" name="password" class="form-control" placeholder="Leave blank to keep current">
        </div>
        <div class="col-md-6">
            <label class="form-label">Confirm New Password</label>
            <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password">
        </div>
        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            <button type="reset" class="btn btn-outline-secondary ms-2">Cancel</button>
        </div>
    </div>
</form>
