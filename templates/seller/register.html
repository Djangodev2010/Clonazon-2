{% extends "seller/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
{% include "partials/messages_partial.html" %}
<h1 style="text-align:center;">Register</h1>
<form
    class="mt-3 mb-3" 
    style="width:380px; margin:auto;"
    method="POST"
    action='{% url "seller:seller_registeration" %}'>
    {% csrf_token %}
    {{form | crispy}}
    <button class="btn btn-success">Submit</button>
</form>
<p style="text-align:center;">Already Have An Account? What Are Ya Waitin' For? <a href='{% url "seller:seller_login" %}' style="text-decoration:none;">Login Now!</a></p>
{% endblock content %}
