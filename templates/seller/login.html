{% extends "seller/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
{% include "partials/messages_partial.html" %}
<h1 style="text-align:center;">Login</h1>
<form
    class="mt-3 mb-3"
    style="width:380px; margin:auto;"
    method="POST"
    action='{% url "seller:seller_login" %}'>
    {% csrf_token %}
    {{form | crispy}}
    <button class="btn btn-success" type="submit">Submit</button>
</form>
<p style="text-align:center;">Don't Have An Account? We Gotcha! <a href='{% url "seller:seller_registeration" %}' style="text-decoration:none;">Register Now!</a></p>
{% endblock content %}
