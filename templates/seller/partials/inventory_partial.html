<div class="container-fluid mt-4 px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">Product Inventory</h2>
            <p class="text-muted">Manage your stock levels and product visibility</p>
        </div>
        <a href='{% url "seller:add_product" %}'><button class="btn btn-primary px-4 py-2 shadow-sm">
            <i class="bi bi-plus-circle me-2"></i>Add New Product
        </button></a>
    </div>

    <div class="row mb-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
                <small class="text-uppercase fw-bold text-muted" style="font-size: 0.75rem;">Total Items</small>
                <h3 class="fw-bold mb-0">{{total_items}}</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3">
                <small class="text-uppercase fw-bold text-muted" style="font-size: 0.75rem;">Active Listings</small>
                <h3 class="fw-bold mb-0 text-success">1{{active_listings}}</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3 text-warning">
                <small class="text-uppercase fw-bold text-muted" style="font-size: 0.75rem;">Low Stock</small>
                <h3 class="fw-bold mb-0">{{low_stock}}</h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm p-3 text-danger">
                <small class="text-uppercase fw-bold text-muted" style="font-size: 0.75rem;">Out of Stock</small>
                <h3 class="fw-bold mb-0">{{out_of_stock}}</h3>
            </div>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light border-bottom">
                        <tr>
                            <th class="ps-4 py-3 text-muted fw-semibold">PRODUCT</th>
                            <th class="py-3 text-muted fw-semibold">CATEGORY</th>
                            <th class="py-3 text-muted fw-semibold">PRICE</th>
                            <th class="py-3 text-muted fw-semibold">STOCK</th>
                            <th class="py-3 text-muted fw-semibold">STATUS</th>
                            <th class="text-end pe-4 py-3 text-muted fw-semibold">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="inventory_item">
                        {% include "seller/partials/inventory_item_partial.html" %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    /* Styling to match your clean profile UI */
    .badge {
        font-weight: 500;
        border-radius: 6px;
    }
    .table thead th {
        font-size: 0.8rem;
        letter-spacing: 0.5px;
    }
    .card {
        border-radius: 12px;
    }
</style>
