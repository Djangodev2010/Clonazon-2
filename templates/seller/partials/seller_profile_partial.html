<div class="card p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Seller Profile</h4>
        </div>

        <div class="row align-items-center mb-4">
            <div class="col-auto">
                <div class="bg-primary-subtle rounded-circle d-flex align-items-center justify-content-center" style="width: 80px; height: 80px;">
                    <i class="bi bi-person-badge-fill fs-1 text-primary"></i>
                </div>
            </div>
            <div class="col">
                <h5 class="mb-1 text-capitalize">{{ user.get_full_name }}</h5>
                <p class="text-muted mb-0">{{ user.email }}</p>
                <span class="badge bg-success-subtle text-success mt-2">Active Seller</span>
            </div>
        </div>

        <hr class="my-4 text-secondary opacity-25">

        <div class="row g-4 mb-4">
            {% include "partials/account_settings_partial.html" %}
        </div>
    </div>
