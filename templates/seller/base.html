<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Seller Central{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js" integrity="sha384-/TgkGk7p307TH7EXJDuUlgG3Ce1UVolAOFopFekQkkXihi5u/6OCvVKyz1W+idaz" crossorigin="anonymous"></script>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: white; border-right: 1px solid #dee2e6; }
        .nav-pills .nav-link { color: #495057; border-radius: 8px; margin-bottom: 5px; }
        .nav-pills .nav-link.active { background-color: #0d6efd; color: white; }
        .nav-pills .nav-link:hover:not(.active) { background-color: #e9ecef; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse p-3">
            <div class="position-sticky">
                <a style='text-decoration:none;' href='{% url "seller:seller_profile" %}'><div class="d-flex align-items-center mb-4 ps-2">
                    <i class="bi bi-shop text-primary fs-3 me-2"></i>
                    <h5 class="mb-0 fw-bold">Seller Central</h5>
                </div></a>
                
                <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">
                    <a
                    hx-get='{% url "seller:seller_profile" %}'
                    hx-target='#main-display-area'
                    class="nav-link">
                        <i class="bi bi-person me-2"></i> Profile
                    </a>

                    <a
                    hx-get='{% url "seller:pending_orders" %}'
                    hx-target="#main-display-area"
                    class="nav-link">
                        <i class="bi bi-hourglass-split me-2"></i> Pending Orders
                    </a>

                    <a
                    hx-get='{% url "seller:inventory" %}'
                    hx-target='#main-display-area'
                    class="nav-link ">
                        <i class="bi bi-box-seam me-2"></i> Inventory
                    </a>

                    <hr>
                    <a class="nav-link text-danger" href="{% url 'logout' %}">
                        <i class="bi bi-box-arrow-left me-2"></i> Logout
                    </a>
                </div>
            </div>
        </nav>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            <div id="main-display-area">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
